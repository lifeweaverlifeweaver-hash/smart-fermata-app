<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFermata | Secure Admin</title>
    <style>
        :root { --dark: #10214a; --green: #27ae60; --bg: #f4f7f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }

        .header { background: var(--dark); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 70px; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        
        /* КОНТЕЙНЕР ЗА ВГРАДЕНОТО ЛОГО */
        .main-logo { width: 50px; height: 50px; border-radius: 50%; background: white; border: 2px solid white; object-fit: cover; }

        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--dark); transition: 0.3s; z-index: 1100; padding-top: 20px; }
        .sidebar.active { left: 0; }
        .sb-header { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sb-logo { width: 100px; height: 100px; border-radius: 50%; background: white; margin-bottom: 10px; object-fit: cover; border: 3px solid white; }

        .nav-btn { width: 100%; background: none; border: none; color: #adb5bd; padding: 18px 25px; text-align: left; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.1); border-left: 4px solid var(--green); }

        .main { padding: 20px; height: calc(100vh - 70px); overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid var(--green); margin-bottom: 15px; }
        .val { font-size: 32px; font-weight: bold; color: var(--dark); }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1050; }
        .overlay.active { display: block; }
    </style>
</head>
<body oncontextmenu="return false;">

    <header class="header">
        <div class="logo-area">
            <img src="https://i.ibb.co/VpXhM2N/1000021168.png?v=2" class="main-logo" id="logo1">
            <b style="font-size: 1.2rem;">SmartFermata</b>
        </div>
        <button onclick="t()" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">☰</button>
    </header>

    <div class="overlay" id="ov" onclick="t()"></div>

    <aside class="sidebar" id="sb">
        <div class="sb-header">
            <img src="https://i.ibb.co/VpXhM2N/1000021168.png?v=2" class="sb-logo" id="logo2">
            <h2 style="color:white; font-size: 1.2rem;">Admin Panel</h2>
        </div>
        <nav>
            <button class="nav-btn active" onclick="show('d', this)">📊 Табло</button>
            <button class="nav-btn" onclick="show('h', this)">🐎 Коне</button>
            <button class="nav-btn" onclick="show('f', this)">💰 Финанси</button>
        </nav>
    </aside>

    <main class="main">
        <div id="d" class="page active">
            <h1>Здравейте, Цветелина!</h1>
            <p style="color:#888; margin-bottom:20px;">Конна База "Зорница"</p>
            <div class="card"><small>Спестени такси</small><div class="val">144 €</div></div>
            <div class="card" style="border-top-color:var(--dark)"><small>Дневен Оборот</small><div class="val">480 €</div></div>
        </div>
        <div id="h" class="page"><h1>🐎 График</h1><div class="card">Всичко е защитено.</div></div>
        <div id="f" class="page"><h1>💰 Финанси</h1><div class="card">Криптиран достъп.</div></div>
    </main>

    <script>
        function t() {
            document.getElementById('sb').classList.toggle('active');
            document.getElementById('ov').classList.toggle('active');
        }
        function show(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(window.innerWidth < 769) t();
        }

        // --- ЗАЩИТА НА КОДА ---
        document.addEventListener('keydown', function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                e.preventDefault();
                return false;
            }
        });

        // Защита от специалисти (debugger)
        setInterval(function() {
            (function() { return false; }['constructor']('debugger')['call']());
        }, 50);

        // Форсиране на логото да се появи
        window.onload = function() {
            const ts = new Date().getTime();
            document.getElementById('logo1').src += "?t=" + ts;
            document.getElementById('logo2').src += "?t=" + ts;
        };
    </script>
</body>
</html>
