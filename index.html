<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horsenook | Ultimate ERP v7</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #3d2b1f; --s: #8c7356; --bg: #f9f6f2; --accent: #d4a373; --white: #ffffff; --red: #e74c3c; --green: #27ae60; --viber: #7360f2; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--p); transition: 0.3s; z-index: 1000; padding-top: 50px; color: var(--white); }
        .sidebar.active { left: 0; }
        .nav-item { padding: 18px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; }
        .top-bar { background: var(--p); color: var(--white); padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 900; }
        .card { background: var(--white); margin: 12px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 6px solid var(--s); }
        .btn-main { background: var(--p); color: var(--white); border: none; padding: 16px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .pay-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .pay-btn { padding: 12px; border: 2px solid #eee; border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; }
        .pay-btn.active { border-color: var(--s); background: #fdfaf5; }
        .check-in-box { background: #edf2f7; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 10px; }
        .storno-btn { color: var(--red); font-size: 12px; cursor: pointer; margin-top: 5px; display: block; }
        #login-screen { position: fixed; inset: 0; background: var(--p); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--white); }
        .badge-vouch { background: #fef3c7; color: #92400e; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="https://lifeweaverlifeweaver-hash.github.io/smart-fermata-app/logo.png" style="width:100px; border-radius:50%; background:white; padding:5px; margin-bottom:20px;">
        <h2>HORSENOOK ERP v7</h2>
        <button class="btn-main" style="background:white; color:var(--p); width:80%; margin-bottom:15px;" onclick="init('admin')">МЕНИДЖЪР ПАНЕЛ</button>
        <button class="btn-main" style="background:var(--s); width:80%;" onclick="init('client')">КЛИЕНТСКИ ПАНЕЛ</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div id="adm-nav" style="display:none;">
            <div class="nav-item" onclick="page('dash')"><i class="fas fa-home"></i> Табло & Сторно</div>
            <div class="nav-item" onclick="page('staff')"><i class="fas fa-user-clock"></i> График & Чекиране</div>
            <div class="nav-item" onclick="page('vet_stock')"><i class="fas fa-hand-holding-medical"></i> Склад & Ветеринари</div>
            <div class="nav-item" onclick="page('vouchers')"><i class="fas fa-ticket-alt"></i> Ваучери & Програма</div>
            <div class="nav-item" onclick="page('reports')"><i class="fas fa-file-invoice-dollar"></i> Z-Отчет / Счетоводство</div>
        </div>
        <div id="cli-nav" style="display:none;">
            <div class="nav-item" onclick="page('booking')"><i class="fas fa-calendar-check"></i> Резервация</div>
        </div>
        <div class="nav-item" onclick="location.reload()" style="color:#ff7675; margin-top:20px;"><i class="fas fa-sign-out-alt"></i> Изход</div>
    </div>

    <div class="top-bar">
        <i class="fas fa-bars" style="font-size:24px; margin-right:15px; cursor:pointer;" onclick="document.getElementById('sidebar').classList.toggle('active')"></i>
        <b id="h-title">Horsenook</b>
    </div>

    <div id="app-body"></div>

    <script>
        const config = {
            apiKey: "AIzaSyAfkaWtQyWDHLOIXCG4CrpAOX3Nt9pmcpE",
            authDomain: "smartfermata.firebaseapp.com",
            databaseURL: "https://smartfermata-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "smartfermata"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let role = ''; let state = null; let payM = 'Card';

        function init(r) {
            role = r;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById(r === 'admin' ? 'adm-nav' : 'cli-nav').style.display = 'block';
            db.ref('horsenook_ultimate_v7').on('value', (s) => {
                state = s.val();
                if(!state) setupInit(); else page(r === 'admin' ? 'dash' : 'booking');
            });
        }

        function page(p) {
            const body = document.getElementById('app-body');
            document.getElementById('sidebar').classList.remove('active');
            body.innerHTML = '';

            if(p === 'dash') {
                document.getElementById('h-title').innerText = "Дневни продажби";
                body.innerHTML = `<div class="card"><h3>💰 Оборот: ${state.income} лв.</h3><div id="sales-list"></div></div>`;
                if(state.sales) Object.entries(state.sales).reverse().forEach(([id, s]) => {
                    body.querySelector('#sales-list').innerHTML += `
                    <div style="border-bottom:1px solid #eee; padding:10px 0;">
                        <b>${s.client}</b> (${s.amount}лв. - ${s.method})<br>
                        <small>${s.date}</small>
                        <span class="storno-btn" onclick="storno('${id}', ${s.amount})">⚠️ Сторно (Анулирай)</span>
                    </div>`;
                });
            }
            else if(p === 'staff') {
                document.getElementById('h-title').innerText = "Контрол на персонала";
                body.innerHTML = `
                <div class="card"><h3>👨‍🌾 Чекиране в базата</h3>
                <input id="staff-name" placeholder="Вашето име">
                <div style="display:flex; gap:10px;">
                    <button class="btn-main" style="background:var(--green)" onclick="checkIn('Влизане')">ВЛИЗАНЕ</button>
                    <button class="btn-main" style="background:var(--red)" onclick="checkIn('Излизане')">ИЗЛИЗАНЕ</button>
                </div>
                <div id="log-list" style="margin-top:15px; font-size:12px;"></div></div>`;
                if(state.logs) Object.values(state.logs).reverse().forEach(l => {
                    body.querySelector('#log-list').innerHTML += `<div>[${l.time}] ${l.name}: ${l.action}</div>`;
                });
            }
            else if(p === 'vet_stock') {
                document.getElementById('h-title').innerText = "Склад & Здраве";
                body.innerHTML = `
                <div class="card"><h3>📦 Склад</h3><p>Сено: ${state.stock.hay} бали</p><p>Овес: ${state.stock.oats} кг</p></div>
                <div class="card"><h3>🩺 Ветеринари</h3>
                <p>Д-р Георгиев: <a href="tel:0888111222">0888111222</a></p>
                <p>Д-р Маринова: <a href="tel:0888333444">0888333444</a></p>
                <hr><b>Хранене:</b> 07:00 (Сено), 13:00 (Овес), 19:00 (Сено)</div>`;
            }
            else if(p === 'vouchers') {
                document.getElementById('h-title').innerText = "Ваучери & Програма";
                body.innerHTML = `
                <div class="card"><h3>🎟️ Създай Ваучер</h3>
                <input id="v-name" placeholder="Име на ваучера (напр. Свободен Понеделник)">
                <input id="v-disc" type="number" placeholder="Отстъпка в лв.">
                <button class="btn-main" onclick="addVoucher()">ПУСНИ ВАУЧЕР</button></div>`;
            }
            else if(p === 'booking') {
                document.getElementById('h-title').innerText = "Резервация";
                Object.values(state.horses || {}).forEach((h, i) => {
                    body.innerHTML += `
                    <div class="card">
                        <h3>🐎 ${h.name} - ${h.price} лв.</h3>
                        <input id="cn-${i}" placeholder="Име и Фамилия"><input id="ct-${i}" placeholder="Телефон">
                        <div class="pay-grid">
                            <div class="pay-btn active" onclick="setPay(this, 'Card')">Карта</div>
                            <div class="pay-btn" onclick="setPay(this, 'Stripe')">Stripe</div>
                            <div class="pay-btn" onclick="setPay(this, 'ViberPay')">ViberPay</div>
                            <div class="pay-btn" onclick="setPay(this, 'EasyPay')">EasyPay</div>
                        </div>
                        <button class="btn-main" onclick="book(${i}, '${h.name}', ${h.price})">ПЛАТИ</button>
                    </div>`;
                });
            }
        }

        function setPay(el, m) { document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); payM = m; }
        
        function book(idx, h, p) {
            const name = document.getElementById('cn-'+idx).value;
            const phone = document.getElementById('ct-'+idx).value;
            if(!name) return alert('Име?');
            db.ref('horsenook_ultimate_v7/income').set(state.income + parseInt(p));
            db.ref('horsenook_ultimate_v7/sales').push({ client: name, phone: phone, horse: h, amount: p, method: payM, date: new Date().toLocaleString() });
            alert('Плащането прието!');
        }

        function checkIn(act) {
            const name = document.getElementById('staff-name').value;
            if(!name) return alert('Име на работник?');
            db.ref('horsenook_ultimate_v7/logs').push({ name, action: act, time: new Date().toLocaleString() });
            alert(act + ' успешно!');
        }

        function storno(id, amt) {
            if(confirm('Анулиране на плащането?')) {
                db.ref('horsenook_ultimate_v7/income').set(state.income - amt);
                db.ref('horsenook_ultimate_v7/sales/' + id).remove();
            }
        }

        function setupInit() {
            db.ref('horsenook_ultimate_v7').set({
                income: 550,
                stock: { hay: 200, oats: 150 },
                horses: { "1": {name: "Сириус", price: 60}, "2": {name: "Бела", price: 60} },
                staff: { "1": {name: "Христо"}, "2": {name: "Надя"} }
            });
        }
    </script>
</body>
</html>
