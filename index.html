<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFermata | Horsenook Enterprise Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #3d2b1f; --s: #8c7356; --bg: #f9f6f2; --accent: #d4a373; --white: #ffffff; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--p); transition: 0.3s; z-index: 1000; padding-top: 50px; color: var(--white); }
        .sidebar.active { left: 0; }
        .nav-item { padding: 18px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; }
        .nav-item i { margin-right: 15px; width: 25px; color: var(--accent); }
        
        .top-bar { background: var(--p); color: var(--white); padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 900; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .card { background: var(--white); margin: 15px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 6px solid var(--s); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-main { background: var(--p); color: var(--white); border: none; padding: 16px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-pay { background: var(--success); margin-top: 15px; }
        
        .payment-opt { display: flex; gap: 10px; margin: 10px 0; }
        .pay-box { flex: 1; padding: 10px; border: 2px solid #eee; border-radius: 8px; text-align: center; cursor: pointer; font-size: 12px; font-weight: bold; }
        .pay-box.active { border-color: var(--s); background: #fdfaf5; }
        
        #login-screen { position: fixed; inset: 0; background: var(--p); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--white); }
        .logo-box { width: 110px; height: 110px; border-radius: 50%; background: white; padding: 5px; margin-bottom: 20px; }
        
        .conto-badge { background: #eef2ff; color: #4338ca; padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; border: 1px solid #c7d2fe; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="https://lifeweaverlifeweaver-hash.github.io/smart-fermata-app/logo.png" class="logo-box">
        <h2>HORSENOOK ENTERPRISE</h2>
        <button class="btn-main" style="background:white; color:var(--p); width:80%; margin-bottom:15px;" onclick="start('admin')">АДМИН ПАНЕЛ</button>
        <button class="btn-main" style="background:var(--s); width:80%;" onclick="start('client')">КЛИЕНТСКИ ПОРТАЛ</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div id="adm-nav" style="display:none;">
            <div class="nav-item" onclick="page('dash')"><i class="fas fa-chart-line"></i> Дашборд</div>
            <div class="nav-item" onclick="page('conto')"><i class="fas fa-file-invoice-dollar"></i> ContoWeave Анализ</div>
            <div class="nav-item" onclick="page('vet')"><i class="fas fa-vial"></i> Вет. Контрол</div>
        </div>
        <div id="cli-nav" style="display:none;">
            <div class="nav-item" onclick="page('booking')"><i class="fas fa-horse"></i> Резервирай Езда</div>
        </div>
        <div class="nav-item" onclick="location.reload()" style="color:#ff7675; margin-top:30px;"><i class="fas fa-sign-out-alt"></i> Изход</div>
    </div>

    <div class="top-bar">
        <i class="fas fa-bars" style="font-size:24px; margin-right:15px;" onclick="document.getElementById('sidebar').classList.toggle('active')"></i>
        <b id="header-title">Horsenook</b>
    </div>

    <div id="main"></div>

    <script>
        const config = {
            apiKey: "AIzaSyAfkaWtQyWDHLOIXCG4CrpAOX3Nt9pmcpE",
            authDomain: "smartfermata.firebaseapp.com",
            databaseURL: "https://smartfermata-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "smartfermata"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let currentRole = ''; let state = null; let selectedPay = 'card';

        function start(r) {
            currentRole = r;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById(r === 'admin' ? 'adm-nav' : 'cli-nav').style.display = 'block';
            db.ref('horsenook_ent_v4').on('value', (s) => {
                state = s.val();
                if(!state) setupInit(); else page(r === 'admin' ? 'dash' : 'booking');
            });
        }

        function page(p) {
            const container = document.getElementById('main');
            document.getElementById('sidebar').classList.remove('active');
            container.innerHTML = '';

            if(p === 'booking') {
                document.getElementById('header-title').innerText = "Избери Кон за Езда";
                state.horses.forEach((h, i) => {
                    container.innerHTML += `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <h3>🐎 ${h.name}</h3>
                                <b style="color:var(--s)">${h.price} лв.</b>
                            </div>
                            <input id="n-${i}" placeholder="Вашето Име">
                            <input id="t-${i}" placeholder="Телефон">
                            
                            <label style="font-size:12px; font-weight:bold; color:#777;">МЕТОД НА ПЛАЩАНЕ:</label>
                            <div class="payment-opt">
                                <div class="pay-box active" onclick="setPay(this, 'card')"><i class="fas fa-credit-card"></i><br>Карта</div>
                                <div class="pay-box" onclick="setPay(this, 'easypay')"><i class="fas fa-money-bill-wave"></i><br>EasyPay</div>
                            </div>
                            <button class="btn-main btn-pay" onclick="processPay(${i})">ПОТВЪРДИ И ПЛАТИ</button>
                        </div>`;
                });
            }
            else if(p === 'conto') {
                document.getElementById('header-title').innerText = "ContoWeave Счетоводство";
                container.innerHTML = `
                    <div class="card">
                        <div class="conto-badge">LIVE SYNC ACTIVE</div>
                        <h3>Финансов анализ за периода</h3>
                        <p>Общо приходи: <b>${state.income} лв.</b></p>
                        <p>Транзакции към счетоводител: <b>${state.sales ? Object.keys(state.sales).length : 0}</b></p>
                        <button class="btn-main" style="background:#4338ca" onclick="alert('Данните са изпратени към ContoWeave!')">ЕКСПОРТ КЪМ СЧЕТОВОДСТВО</button>
                    </div>`;
            }
            else if(p === 'dash') {
                document.getElementById('header-title').innerText = "Админ Контрол";
                container.innerHTML = `
                    <div class="card" style="background:var(--p); color:white;">
                        <h2>${state.income} лв.</h2><p>Текущ баланс</p>
                    </div>
                    <div class="card"><h3>📦 Склад Сено: ${state.stock.hay} бали</h3></div>`;
            }
        }

        function setPay(el, type) {
            document.querySelectorAll('.pay-box').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            selectedPay = type;
        }

        function processPay(idx) {
            const name = document.getElementById('n-'+idx).value;
            if(!name) return alert('Въведете име!');
            const h = state.horses[idx];
            const msg = selectedPay === 'card' ? 'Плащането с карта е успешно!' : 'Код за EasyPay: 882341 - Платете на каса.';
            
            db.ref('horsenook_ent_v4/income').set(state.income + parseInt(h.price));
            db.ref('horsenook_ent_v4/sales').push({ horse: h.name, amount: h.price, clientName: name, method: selectedPay, date: new Date().toLocaleString() });
            
            alert(msg);
        }

        function setupInit() {
            db.ref('horsenook_ent_v4').set({
                income: 420,
                stock: { hay: 180 },
                horses: [
                    { name: "Сириус", price: 60 },
                    { name: "Бела", price: 50 },
                    { name: "Апачи", price: 70 }
                ],
                sales: { "init": { clientName: "Демо", amount: 60, horse: "Сириус", date: "16.04.2026" } }
            });
        }
    </script>
</body>
</html>
