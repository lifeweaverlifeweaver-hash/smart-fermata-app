<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFermata Enterprise</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #10214a; --s: #27ae60; --bg: #f0f4f8; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        
        /* Navigation */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--p); transition: 0.3s; z-index: 1000; padding-top: 50px; color: white; }
        .sidebar.active { left: 0; }
        .nav-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; }
        .nav-item i { margin-right: 15px; color: #3498db; width: 20px; }
        .top-bar { background: var(--p); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 900; }
        
        /* UI Elements */
        .card { background: white; margin: 12px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--p); }
        .vet-card { border-left-color: var(--danger); }
        .staff-card { border-left-color: #f39c12; }
        
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        label { font-size: 11px; font-weight: bold; color: #777; text-transform: uppercase; }
        .btn { background: var(--p); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #login-screen { position: fixed; inset: 0; background: var(--p); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="logo.png" style="width: 100px; border-radius: 50%; background: white; padding: 5px; margin-bottom: 20px;">
        <h1>SmartFermata Pro</h1>
        <button class="btn" style="background:white; color:var(--p); width:80%;" onclick="start('admin')">АДМИНИСТРАТОР</button>
        <button class="btn" style="background:var(--s); width:80%;" onclick="start('client')">КЛИЕНТИ</button>
    </div>

    <div class="sidebar" id="menu">
        <div id="admin-nav">
            <div class="nav-item" onclick="show('fin')"><i class="fas fa-wallet"></i> Приходи и Отчети</div>
            <div class="nav-item" onclick="show('vet')"><i class="fas fa-first-aid"></i> Ветеринарен Дневник</div>
            <div class="nav-item" onclick="show('staff')"><i class="fas fa-users-cog"></i> График Персонал</div>
            <div class="nav-item" onclick="show('horses')"><i class="fas fa-horse"></i> Регистър Коне</div>
            <div class="nav-item" onclick="show('stock')"><i class="fas fa-warehouse"></i> Склад</div>
        </div>
        <div class="nav-item" onclick="location.reload()" style="color:#ff7675; margin-top:30px;"><i class="fas fa-sign-out-alt"></i> Изход</div>
    </div>

    <div class="top-bar">
        <i class="fas fa-bars" style="font-size:24px; margin-right:20px;" onclick="document.getElementById('menu').classList.toggle('active')"></i>
        <b id="page-title">SmartFermata</b>
    </div>

    <div id="app-body"></div>

    <script>
        const config = {
            apiKey: "AIzaSyAfkaWtQyWDHLOIXCG4CrpAOX3Nt9pmcpE",
            authDomain: "smartfermata.firebaseapp.com",
            databaseURL: "https://smartfermata-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "smartfermata"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let currentRole = ''; let appData = null;

        function start(role) {
            currentRole = role; document.getElementById('login-screen').style.display = 'none';
            db.ref('smart_fermata').on('value', (s) => { 
                appData = s.val(); 
                if(!appData) { seedData(); } else { show(role === 'admin' ? 'fin' : 'booking'); }
            });
        }

        function show(page) {
            const container = document.getElementById('app-body');
            const title = document.getElementById('page-title');
            container.innerHTML = ''; document.getElementById('menu').classList.remove('active');

            if(page === 'vet') {
                title.innerText = "Ветеринарен Дневник";
                appData.horses.forEach((h, i) => {
                    container.innerHTML += `
                        <div class="card vet-card">
                            <h3>🚑 ${h.name}</h3>
                            <label>Последна Ваксина</label>
                            <input type="date" value="${h.lastVax || ''}" onchange="upd('horses/${i}/lastVax', this.value)">
                            <label>Здравен статус / Бележки</label>
                            <textarea onchange="upd('horses/${i}/healthNotes', this.value)">${h.healthNotes || ''}</textarea>
                        </div>`;
                });
            } else if(page === 'staff') {
                title.innerText = "График и Локации";
                const sectors = ["Пясъчник", "Конюшня", "Езда с клиенти", "Почистване"];
                appData.staff.forEach((s, i) => {
                    container.innerHTML += `
                        <div class="card staff-card">
                            <h3>👤 ${s.name}</h3>
                            <label>Работно място в момента:</label>
                            <select onchange="upd('staff/${i}/location', this.value)">
                                ${sectors.map(sec => `<option value="${sec}" ${s.location === sec ? 'selected' : ''}>${sec}</option>`).join('')}
                            </select>
                            <label>Смяна / Часове:</label>
                            <input type="text" value="${s.shift || ''}" onchange="upd('staff/${i}/shift', this.value)">
                        </div>`;
                });
            } else if(page === 'fin') {
                title.innerText = "Финанси и Отчети";
                let total = appData.income || 0;
                container.innerHTML = `
                    <div class="card" style="background:var(--p); color:white; text-align:center;">
                        <h2>${total} лв.</h2><p>Общ доход</p>
                    </div>
                    <div class="card"><h3>Последни активности:</h3><p>${appData.last_sale || 'Няма данни'}</p></div>`;
            }
            // ... допълнителни секции за склад и коне
        }

        function upd(p, v) { db.ref('smart_fermata/' + p).set(v); }

        function seedData() {
            const initial = {
                horses: [
                    {name:"Грохот", price:"40", status:"Свободен", lastVax:"2026-01-10", healthNotes:"Здрав"},
                    {name:"Звезда", price:"50", status:"Зает", lastVax:"2026-02-15", healthNotes:"Нужда от нови подкови"}
                ],
                staff: [
                    {name: "Иван Иванов", location: "Конюшня", shift: "08:00 - 17:00"},
                    {name: "Мария Петрова", location: "Езда с клиенти", shift: "10:00 - 19:00"}
                ],
                income: 0
            };
            db.ref('smart_fermata').set(initial);
        }
    </script>
</body>
</html>
