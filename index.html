<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFermata | Администрация</title>
    <style>
        :root { --p: #10214a; --s: #27ae60; --bg: #f0f2f5; --w: #ffffff; --crit: #d32f2f; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: #333; overflow-x: hidden; }

        /* ВХОД */
        #login-screen { position: fixed; inset: 0; background: var(--p); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .login-btn { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }

        /* ГЛАВНО МЕНЮ */
        .header { background: var(--p); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 70px; position: sticky; top: 0; z-index: 1000; }
        .sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: #1a2a4d; transition: 0.3s; z-index: 2000; padding-top: 20px; }
        .sidebar.active { left: 0; }
        .nav-link { width: 100%; background: none; border: none; color: #adb5bd; padding: 15px 25px; text-align: left; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-link.active { color: white; background: var(--s); border-left: 5px solid white; }

        /* СЪДЪРЖАНИЕ */
        .main { padding: 20px; max-width: 1200px; margin: auto; }
        .page { display: none; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* КАРТИ И РЕДАКЦИЯ */
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 6px solid var(--p); }
        .edit-group { margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn-save { background: var(--s); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        
        .stock-tag { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .low { background: #ffebee; color: var(--crit); }
        .ok { background: #e8f5e9; color: var(--s); }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <img src="logo.png" style="width:100px; margin-bottom:20px;">
            <h2 style="margin-bottom:20px;">SmartFermata</h2>
            <button class="login-btn" style="background:var(--p); color:white;" onclick="init('admin')">ВХОД СОБСТВЕНИК</button>
            <button class="login-btn" style="background:var(--s); color:white;" onclick="init('client')">КЛИЕНТСКИ ПАНЕЛ</button>
        </div>
    </div>

    <header class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="logo.png" style="width:40px; border-radius:50%; background:white;">
            <b id="panel-title">SmartFermata</b>
        </div>
        <button onclick="toggleM()" style="background:none; border:none; color:white; font-size:28px;">☰</button>
    </header>

    <div class="overlay" id="ov" onclick="toggleM()"></div>

    <aside class="sidebar" id="sb">
        <div id="nav-container"></div>
        <button onclick="location.reload()" style="width:100%; color:#ff4d4d; padding:20px; background:none; border:none; text-align:left; font-weight:bold;">✕ Изход</button>
    </aside>

    <main class="main" id="content-container"></main>

    <script>
        // СЪСТОЯНИЕ НА БАЗАТА (Данните се пазят тук)
        let appState = {
            horses: [
                { id: 0, name: "Грохот", status: "Свободен", price: "40 лв", food: "07:00 Сено / 19:00 Овес", health: "Ваксиниран на 10.03.2026", vet: "Д-р Иванов" },
                { id: 1, name: "Звезда", status: "Зает", price: "50 лв", food: "08:00 Сено / 20:00 Овес", health: "Преглед копита - следваща седмица", vet: "Д-р Николова" }
            ],
            stock: { hay: 25, oats: 120, carrots: 15 },
            staff: [
                { name: "Иван Г.", role: "Гледач", shift: "06:00 - 18:00", tasks: "Почистване боксове, хранене" }
            ]
        };

        function init(role) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('panel-title').innerText = role === 'admin' ? 'Админ Панел' : 'Клиентски Панел';
            render(role);
        }

        function render(role) {
            const nav = document.getElementById('nav-container');
            const content = document.getElementById('content-container');
            nav.innerHTML = ''; content.innerHTML = '';

            if(role === 'admin') {
                // АДМИН МЕНЮ
                addPage('a_dash', '📊 Табло', `
                    <h2>Складова наличност</h2>
                    <div class="card">
                        <b>Сено:</b> ${appState.stock.hay} бали <span class="stock-tag ${appState.stock.hay < 30 ? 'low' : 'ok'}">${appState.stock.hay < 30 ? 'КРИТИЧНО' : 'OK'}</span><br><br>
                        <b>Овес:</b> ${appState.stock.oats} кг<br><br>
                        <div class="edit-group">
                            <label>Бърза корекция сено (бали):</label>
                            <input type="number" id="inp-hay" value="${appState.stock.hay}">
                            <button class="btn-save" onclick="updateStock()">Запази Склада</button>
                        </div>
                    </div>
                `);

                addPage('a_horses', '🐎 Коне & Здраве', `
                    <h2>Управление на конете</h2>
                    ${appState.horses.map(h => `
                        <div class="card">
                            <h3>${h.name}</h3>
                            <p>🩺 Здраве: ${h.health}</p>
                            <p>🥣 Хранене: ${h.food}</p>
                            <div class="edit-group">
                                <label>Статус:</label>
                                <select id="st-${h.id}"><option ${h.status==='Свободен'?'selected':''}>Свободен</option><option ${h.status==='Зает'?'selected':''}>Зает</option></select>
                                <label>Цена езда:</label>
                                <input type="text" id="pr-${h.id}" value="${h.price}">
                                <label>Здравословно състояние:</label>
                                <textarea id="he-${h.id}">${h.health}</textarea>
                                <button class="btn-save" onclick="updateHorse(${h.id})">Обнови Данните</button>
                            </div>
                        </div>
                    `).join('')}
                `);

                addPage('a_staff', '👥 Персонал', `
                    <h2>График на служителите</h2>
                    ${appState.staff.map(s => `
                        <div class="card">
                            <b>${s.name}</b> (${s.role})<br>
                            <small>Смяна: ${s.shift}</small><br>
                            <p style="margin-top:10px;">📋 Задачи: ${s.tasks}</p>
                        </div>
                    `).join('')}
                `);

            } else {
                // КЛИЕНТ МЕНЮ
                addPage('c_main', '🏠 Начало', `<div class="card"><h2>Добре дошли в Зорница!</h2><p>Тук можете да видите свободните коне за езда днес.</p></div>`);
                addPage('c_horses', '🐎 Коне за езда', `
                    <h2>Свободни за днес</h2>
                    ${appState.horses.map(h => `
                        <div class="card" style="border-left-color: ${h.status==='Свободен'?'var(--s)':'#ccc'}">
                            <b>${h.name}</b> - ${h.status}<br>
                            <big><b>Цена: ${h.price}</b></big>
                        </div>
                    `).join('')}
                `);
            }
        }

        function addPage(id, name, html) {
            const nav = document.getElementById('nav-container');
            const content = document.getElementById('content-container');
            const active = nav.children.length === 0 ? 'active' : '';
            nav.innerHTML += `<button class="nav-link ${active}" onclick="show('${id}', this)">${name}</button>`;
            content.innerHTML += `<div id="${id}" class="page ${active}">${html}</div>`;
        }

        function updateStock() {
            appState.stock.hay = document.getElementById('inp-hay').value;
            alert("Складът е обновен!");
            render('admin');
        }

        function updateHorse(id) {
            appState.horses[id].status = document.getElementById('st-'+id).value;
            appState.horses[id].price = document.getElementById('pr-'+id).value;
            appState.horses[id].health = document.getElementById('he-'+id).value;
            alert("Данните за " + appState.horses[id].name + " са запазени!");
            render('admin');
        }

        function toggleM() { document.getElementById('sb').classList.toggle('active'); document.getElementById('ov').classList.toggle('active'); }
        function show(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
            if(window.innerWidth < 769) toggleM();
        }
    </script>
</body>
</html>
