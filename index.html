<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFermata | Професионално управление</title>
    <style>
        /* ОСНОВНИ СТИЛОВЕ */
        :root { 
            --primary-color: #10214a; /* Тъмно синьото от логото */
            --accent-color: #27ae60; 
            --bg-color: #f4f7f6; 
            --white: #ffffff; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: #333; 
            overflow-x: hidden;
        }

        /* HEADER ЗА МОБИЛЕН */
        .mobile-header { 
            background-color: var(--primary-color); 
            color: white; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 2000; 
            height: 70px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Кръглата рамка за логото в хедъра */
        .header-logo-circle {
            width: 50px;
            height: 50px;
            background-color: white;
            border-radius: 50%;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }
        
        .header-logo-circle img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* СТРАНИЧНО МЕНЮ */
        .sidebar { 
            width: 280px; 
            background-color: var(--primary-color); 
            color: white; 
            height: 100vh; 
            position: fixed; 
            top: 0;
            left: -280px; 
            transition: all 0.3s ease; 
            z-index: 2100; 
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
        }
        
        .sidebar.active { left: 0; }
        
        .sidebar-header { 
            padding: 30px 20px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Голямото лого в менюто */
        .sidebar-logo-img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 15px;
        }
        
        .sidebar-header h2 { font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; }
        .sidebar-header p { font-size: 0.8rem; color: #adb5bd; text-transform: uppercase; letter-spacing: 1px; }
        
        .nav-links { padding: 20px 0; flex-grow: 1; }
        
        .nav-btn { 
            width: 100%; 
            background: none; 
            border: none; 
            color: #adb5bd; 
            padding: 18px 25px; 
            text-align: left; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: all 0.3s; 
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .nav-btn:hover { color: white; background-color: rgba(255,255,255,0.05); }
        .nav-btn.active { color: white; background-color: rgba(255,255,255,0.1); border-left: 4px solid var(--accent-color); padding-left: 21px; }

        .sidebar-footer { padding: 20px; font-size: 0.8rem; color: #6c757d; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; }

        /* ОСНОВНО СЪДЪРЖАНИЕ */
        .main-content { 
            padding: 20px; 
            transition: all 0.3s ease; 
            width: 100%;
        }
        
        .app-section { display: none; opacity: 0; transition: opacity 0.4s ease; }
        .app-section.active { display: block; opacity: 1; }
        
        .section-header { margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .section-header h1 { font-size: 1.8rem; color: var(--primary-color); }
        .date-today { color: #888; font-size: 0.9rem; }

        /* КАРТИ СЪС СТАТИСТИКА */
        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
            margin-bottom: 25px; 
        }
        
        .stat-card { 
            background-color: var(--white); 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            border-left: 5px solid transparent;
            transition: transform 0.2s;
        }
        
        .stat-card:active { transform: scale(0.98); }
