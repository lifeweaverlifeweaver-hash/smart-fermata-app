<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horsenook | Manager Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #3d2b1f; --s: #8c7356; --bg: #f9f6f2; --accent: #d4a373; --white: #ffffff; --green: #27ae60; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--p); transition: 0.3s; z-index: 1000; padding-top: 50px; color: var(--white); }
        .sidebar.active { left: 0; }
        .nav-item { padding: 18px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; }
        .nav-item i { margin-right: 15px; width: 25px; color: var(--accent); }
        .top-bar { background: var(--p); color: var(--white); padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 900; }
        .card { background: var(--white); margin: 12px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 6px solid var(--s); }
        .stat-box { background: var(--p); color: white; text-align: center; padding: 20px; border-radius: 12px; margin: 12px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-main { background: var(--p); color: var(--white); border: none; padding: 16px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .client-row { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; position: relative; }
        .phone-link { color: var(--blue); text-decoration: none; font-weight: bold; display: block; margin-top: 5px; }
        .tag { font-size: 11px; padding: 3px 8px; border-radius: 5px; background: var(--accent); color: white; font-weight: bold; margin-right: 5px; }
        #login-screen { position: fixed; inset: 0; background: var(--p); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--white); }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="https://lifeweaverlifeweaver-hash.github.io/smart-fermata-app/logo.png" style="width:100px; margin-bottom:20px; border-radius:50%; background:white; padding:5px;">
        <h2>HORSENOOK MANAGER</h2>
        <button class="btn-main" style="background:white; color:var(--p); width:80%; margin-bottom:15px;" onclick="start('admin')">ВХОД АДМИНИСТРАЦИЯ</button>
        <button class="btn-main" style="background:var(--s); width:80%;" onclick="start('client')">ВХОД КЛИЕНТИ</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div id="adm-nav" style="display:none;">
            <div class="nav-item" onclick="page('dash')"><i class="fas fa-list-alt"></i> Дневни Тренировки</div>
            <div class="nav-item" onclick="page('manage')"><i class="fas fa-edit"></i> Коне и Персонал</div>
            <div class="nav-item" onclick="page('conto')"><i class="fas fa-file-invoice"></i> Счетоводство</div>
        </div>
        <div id="cli-nav" style="display:none;">
            <div class="nav-item" onclick="page('booking')"><i class="fas fa-calendar-plus"></i> Запиши час</div>
        </div>
        <div class="nav-item" onclick="location.reload()" style="color:#ff7675; margin-top:20px;"><i class="fas fa-power-off"></i> Изход</div>
    </div>

    <div class="top-bar">
        <i class="fas fa-bars" style="font-size:24px; margin-right:15px; cursor:pointer;" onclick="document.getElementById('sidebar').classList.toggle('active')"></i>
        <b id="h-title">Horsenook</b>
    </div>

    <div id="main-view"></div>

    <script>
        const config = {
            apiKey: "AIzaSyAfkaWtQyWDHLOIXCG4CrpAOX3Nt9pmcpE",
            authDomain: "smartfermata.firebaseapp.com",
            databaseURL: "https://smartfermata-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "smartfermata"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let role = ''; let state = null;

        function start(r) {
            role = r;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById(r === 'admin' ? 'adm-nav' : 'cli-nav').style.display = 'block';
            db.ref('horsenook_final_live').on('value', (s) => {
                state = s.val();
                if(!state) initDB(); else page(role === 'admin' ? 'dash' : 'booking');
            });
        }

        function page(p) {
            const box = document.getElementById('main-view');
            document.getElementById('sidebar').classList.remove('active');
            box.innerHTML = '';

            if(p === 'dash') {
                document.getElementById('h-title').innerText = "Дневник на тренировките";
                box.innerHTML = `
                    <div class="stat-box"><h2>${state.income} лв.</h2><p>Оборот от резервации</p></div>
                    <div class="card" style="border-left-color:var(--blue);">
                        <h3>📅 Списък на клиентите:</h3>
                        <div id="client-list"></div>
                    </div>`;
                
                if(state.sales) {
                    Object.entries(state.sales).reverse().forEach(([id, s]) => {
                        document.getElementById('client-list').innerHTML += `
                            <div class="client-row">
                                <span class="tag">🐎 ${s.horse}</span> <span class="tag">👤 Треньор: ${s.coach}</span>
                                <div style="margin-top:10px;"><b>${s.client}</b></div>
                                <a href="tel:${s.phone}" class="phone-link"><i class="fas fa-phone"></i> ${s.phone}</a>
                                <div style="font-size:11px; color:#888; margin-top:5px;">${s.date}</div>
                                <i class="fas fa-check-circle" style="position:absolute; right:15px; top:15px; color:var(--green); font-size:20px;"></i>
                            </div>`;
                    });
                } else {
                    document.getElementById('client-list').innerHTML = "<p style='color:#888;'>Няма записани тренировки за днес.</p>";
                }
            }
            else if(p === 'booking') {
                document.getElementById('h-title').innerText = "Запиши тренировка";
                Object.values(state.horses || {}).forEach((h, i) => {
                    box.innerHTML += `
                        <div class="card">
                            <h3>🐎 ${h.name}</h3><p>Цена: ${h.price} лв.</p>
                            <input id="cn-${i}" placeholder="Трите Ви имена">
                            <input id="ct-${i}" type="tel" placeholder="Телефон за връзка">
                            <label>Изберете любим треньор:</label>
                            <select id="cs-${i}">${Object.values(state.staff || {}).map(s => `<option>${s.name}</option>`)}</select>
                            <button class="btn-main" style="background:var(--s)" onclick="buy(${i}, '${h.name}', ${h.price})">ЗАПАЗИ ЧАС</button>
                        </div>`;
                });
            }
            else if(p === 'manage') {
                document.getElementById('h-title').innerText = "Управление на базата";
                box.innerHTML = `
                    <div class="card"><h3>➕ Добави нов кон</h3>
                    <input id="new-h" placeholder="Име на кон"><input id="new-p" type="number" placeholder="Цена"><button class="btn-main" onclick="addItem('horses', {name:document.getElementById('new-h').value, price:document.getElementById('new-p').value})">ДОБАВИ</button></div>
                    <div class="card"><h3>➕ Добави треньор</h3>
                    <input id="new-s" placeholder="Име на треньор"><button class="btn-main" onclick="addItem('staff', {name:document.getElementById('new-s').value})">ДОБАВИ</button></div>`;
            }
        }

        function buy(idx, horse, price) {
            const name = document.getElementById('cn-'+idx).value;
            const phone = document.getElementById('ct-'+idx).value;
            const coach = document.getElementById('cs-'+idx).value;
            if(!name || !phone) return alert('Моля, попълнете всички полета!');
            
            db.ref('horsenook_final_live/income').set(state.income + parseInt(price));
            db.ref('horsenook_final_live/sales').push({ client: name, phone: phone, horse: horse, coach: coach, amount: price, date: new Date().toLocaleString('bg-BG') });
            alert('Успешно се записахте! Очакваме Ви!');
        }

        function addItem(p, obj) { db.ref('horsenook_final_live/' + p).push(obj); alert('Обновено!'); }

        function initDB() {
            db.ref('horsenook_final_live').set({
                income: 60,
                staff: { "1": {name:"Христо"}, "2": {name:"Надя"} },
                horses: { "1": {name:"Сириус", price:60}, "2": {name:"Бела", price:60} },
                sales: { "init": {client:"Демо Клиент (Пример)", phone:"0888123456", horse:"Сириус", coach:"Христо", amount:60, date:"16.04.2026, 12:00"} }
            });
        }
    </script>
</body>
</html>
