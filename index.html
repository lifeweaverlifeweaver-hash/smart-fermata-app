<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFermata | Secure Admin</title>
    <style>
        :root { --p: #10214a; --s: #27ae60; --bg: #f4f7f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }

        /* HEADER */
        .header { background: var(--p); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; height: 70px; position: relative; z-index: 1000; }
        .l-area { display: flex; align-items: center; gap: 10px; }
        .l-img { width: 50px; height: 50px; border-radius: 50%; background: white; border: 2px solid white; object-fit: cover; }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--p); transition: 0.3s; z-index: 2000; padding-top: 20px; }
        .sidebar.active { left: 0; }
        .sb-h { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sb-l { width: 110px; height: 110px; border-radius: 50%; background: white; margin: 0 auto 10px; border: 3px solid white; object-fit: cover; }

        .btn { width: 100%; background: none; border: none; color: #adb5bd; padding: 18px 25px; text-align: left; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .btn.active { color: white; background: rgba(255,255,255,0.1); border-left: 4px solid var(--s); }

        /* MAIN */
        .main { padding: 20px; height: calc(100vh - 70px); overflow-y: auto; }
        .pg { display: none; }
        .pg.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid var(--s); margin-bottom: 15px; }
        .val { font-size: 32px; font-weight: bold; color: var(--p); }
        
        .ov { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; }
        .ov.active { display: block; }
    </style>
</head>
<body oncontextmenu="return false;">

    <header class="header">
        <div class="l-area">
            <img src="logo.png" class="l-img" alt="Logo">
            <b style="font-size: 1.1rem;">SmartFermata</b>
        </div>
        <button onclick="t()" style="background:none; border:none; color:white; font-size:30px;">☰</button>
    </header>

    <div class="ov" id="ov" onclick="t()"></div>

    <aside class="sidebar" id="sb">
        <div class="sb-h">
            <img src="logo.png" class="sb-l" alt="Logo">
            <h2 style="color:white; font-size: 1.2rem;">SmartFermata</h2>
        </div>
        <nav>
            <button class="btn active" onclick="s('d', this)">📊 Табло</button>
            <button class="btn" onclick="s('h', this)">🐎 Коне</button>
            <button class="btn" onclick="s('f', this)">💰 Финанси</button>
        </nav>
    </aside>

    <main class="main">
        <div id="d" class="pg active">
            <h1>Здравейте, Цветелина! 👋</h1>
            <p style="color:#888; margin-bottom:20px;">Конна База "Зорница"</p>
            <div class="card"><small>Спестени такси</small><div class="val">144 €</div></div>
            <div class="card" style="border-top-color:var(--p)"><small>Дневен Оборот</small><div class="val">480 €</div></div>
        </div>
        <div id="h" class="pg"><h1>🐎 График</h1><div class="card">Данните са защитени.</div></div>
        <div id="f" class="pg"><h1>💰 Финанси</h1><div class="card">Криптиран достъп.</div></div>
    </main>

    <script>
        // Скрипт за работа на менюто
        function t(){document.getElementById('sb').classList.toggle('active');document.getElementById('ov').classList.toggle('active')}
        function s(i,b){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));document.getElementById(i).classList.add('active');document.querySelectorAll('.btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');if(window.innerWidth<769)t()}

        // --- ЗАЩИТА СРЕЩУ КОПИРАНЕ И СПЕЦИАЛИСТИ ---
        // Блокира клавиши F12, Ctrl+U, Ctrl+Shift+I
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && (e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || e.keyCode == 85)) return false;
        };
        // Анти-дебъгер (зацикля конзолата на специалиста)
        setInterval(function(){ (function(){return false}['constructor']('debugger')['call']()); }, 50);
    </script>
</body>
</html>
