<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFermata App</title>
    <style>
        :root { --dark: #10214a; --green: #27ae60; --light: #f4f7f6; }
        body { margin: 0; font-family: sans-serif; background: var(--light); color: #333; }
        
        /* ГОРНА ЛЕНТА */
        .top-nav { background: var(--dark); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; height: 60px; position: sticky; top: 0; z-index: 100; }
        .logo-row { display: flex; align-items: center; gap: 10px; }
        .white-circle { width: 42px; height: 42px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        /* МЕНЮ */
        .side-menu { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--dark); transition: 0.3s; z-index: 200; padding-top: 20px; }
        .side-menu.active { left: 0; }
        .menu-btn { width: 100%; background: none; border: none; color: #ccc; padding: 20px; text-align: left; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu-btn.active { color: white; background: rgba(255,255,255,0.1); border-left: 4px solid var(--green); }

        /* СЪДЪРЖАНИЕ */
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; border-top: 4px solid var(--green); }
        .val { font-size: 30px; font-weight: bold; color: var(--dark); margin: 5px 0; }
        .page { display: none; }
        .page.active { display: block; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 150; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="logo-row">
            <div class="white-circle">
                <svg width="32" height="32" viewBox="0 0 512 512" fill="#10214a">
                    <path d="M440.3 358.3c-23.1-23.1-53.7-36.3-85.9-37.1l-40.4-.9c-14.8-.3-26.7-12.3-27-27.1-.4-19.1 12.1-36.2 30.7-41.9l46.2-14.1c32.7-10 56-39.7 57.8-73.7.8-15.5-2.2-31-8.6-45.2-12.5-27.7-37.8-46.7-67.6-50.6-5.8-.8-11.7-1.1-17.6-1.1-42.5 0-82.6 18.2-110.1 50l-23 26.6c-13.6 15.7-33.1 25.1-54 26l-39.4 1.7c-21.4.9-38.3 18.5-38.3 39.9v101.9c0 22.1 17.9 40 40 40h20.1c11.5 0 22.1-6.5 27.4-16.7l17-33.1c4.5-8.7 13.5-14.2 23.3-14.2h36.1c15.2 0 27.6 12.4 27.6 27.6v127.1c0 15.2-12.4 27.6-27.6 27.6H128c-17.7 0-32 14.3-32 32s14.3 32 32 32h256c17.7 0 32-14.3 32-32s-14.3-32-32-32h-12.7c-17.4 0-31.1-14.8-29.6-32.1 1.6-18.4 16.9-32.9 35.4-32.9h15.2c40.5 0 78.5 17.4 104.9 47.9 11.6 13.4 31.7 15.1 45.3 3.5s15.1-31.7 3.5-45.3c-1.3-1.5-2.7-3-4.1-4.4z"/>
                </svg>
            </div>
            <b style="font-size: 18px;">SmartFermata</b>
        </div>
        <button onclick="toggleM()" style="background:none; border:none; color:white; font-size:28px;">☰</button>
    </header>

    <div class="overlay" id="blur" onclick="toggleM()"></div>

    <nav class="side-menu" id="menu">
        <div style="text-align:center; padding: 20px; color:white; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <b>SmartFermata Admin</b>
        </div>
        <button class="menu-btn active" onclick="openP('dash', this)">📊 Табло</button>
        <button class="menu-btn" onclick="openP('hors', this)">🐎 Коне</button>
        <button class="menu-btn" onclick="openP('mon', this)">💰 Финанси</button>
    </nav>

    <main class="container">
        <div id="dash" class="page active">
            <h1>Здравей, Цветелина!</h1>
            <div class="card">
                <small>Спестени такси</small>
                <div class="val">144 €</div>
            </div>
            <div class="card" style="border-top-color: var(--dark);">
                <small>Дневен Оборот</small>
                <div class="val">480 €</div>
            </div>
        </div>

        <div id="hors" class="page">
            <h1>🐎 Списък Коне</h1>
            <div class="card">Всички 12 коня са в базата.</div>
        </div>

        <div id="mon" class="page">
            <h1>💰 Финансов Отчет</h1>
            <div class="card">Месечен приход: 1,440 €</div>
        </div>
    </main>

    <script>
        function toggleM() {
            document.getElementById('menu').classList.toggle('active');
            document.getElementById('blur').classList.toggle('active');
        }

        function openP(id, b) {
            // Скриване на страниците
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Маркиране на бутона
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            
            // Затваряне на менюто
            toggleM();
        }
    </script>
</body>
</html>
