<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFermata Cloud App</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --p: #10214a; --s: #27ae60; --bg: #f4f7f6; --crit: #d32f2f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }
        
        #login-screen { position: fixed; inset: 0; background: var(--p); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        
        .header { background: var(--p); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; height: 70px; }
        .header img { width: 45px; border-radius: 50%; background: white; }
        
        .main { padding: 20px; height: calc(100vh - 70px); overflow-y: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 5px solid var(--s); }
        
        .btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; }
        
        .nav-link { width: 100%; padding: 15px; background: none; border: none; color: #adb5bd; text-align: left; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--p); transition: 0.3s; z-index: 2000; }
        .sidebar.active { left: 0; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <img src="logo.png" style="width:80px; margin-bottom:15px;">
            <h2>База Зорница</h2>
            <button class="btn" style="background:var(--p)" onclick="start('admin')">СОБСТВЕНИК</button>
            <button class="btn" style="background:var(--s)" onclick="start('client')">КЛИЕНТ</button>
        </div>
    </div>

    <header class="header">
        <div style="display:flex; align-items:center; gap:10px;"><img src="logo.png"><b>SmartFermata</b></div>
        <button onclick="toggleM()" style="background:none; border:none; color:white; font-size:30px;">☰</button>
    </header>

    <aside class="sidebar" id="sb">
        <nav id="nav-box"></nav>
        <button onclick="location.reload()" style="width:100%; color:#ff4d4d; padding:20px; background:none; border:none; text-align:left;">✕ Изход</button>
    </aside>

    <main class="main" id="main-box"></main>

    <script>
        // ТУК СЛОЖИ ТВОИТЕ ДАННИ ОТ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAfkaWtQyWDHL0IXCG4CrpAOX3Nt9pmcpE",
            authDomain: "smartfermata.firebaseapp.com",
            databaseURL: "https://ТВОЯТ_ПРОЕКТ.firebaseio.com",
            projectId: "smartfermata",
            storageBucket: "smartfermata.firebasestorage.app",
            messagingSenderId: "638532750076",
            appId: "1:638532750076:web:71f61dc54b104fb9586579"
             measurementId: "G-LXFY13M2Q5"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRole = '';

        function start(role) {
            currentRole = role;
            document.getElementById('login-screen').style.display = 'none';
            listenToData();
        }

        // Слушане за промени в реално време
        function listenToData() {
            db.ref('base_data').on('value', (snapshot) => {
                const data = snapshot.val();
                renderUI(data);
            });
        }

        function renderUI(data) {
            const main = document.getElementById('main-box');
            const nav = document.getElementById('nav-box');
            main.innerHTML = ''; nav.innerHTML = '';

            if (currentRole === 'admin') {
                // АДМИН ПАНЕЛ (ПЪЛЕН ДОСТЪП)
                main.innerHTML = `
                    <h2>📦 Склад</h2>
                    <div class="card">
                        <p>Сено: ${data.inventory.hay} бали</p>
                        <input type="number" id="hay-inp" value="${data.inventory.hay}">
                        <button class="btn" style="background:var(--p)" onclick="saveStock()">Запази Склад</button>
                    </div>
                    <h2>🐎 Коне</h2>
                    ${data.horses.map((h, i) => `
                        <div class="card">
                            <b>${h.name}</b>
                            <select onchange="updateHorse(${i}, 'status', this.value)">
                                <option ${h.status==='Свободен'?'selected':''}>Свободен</option>
                                <option ${h.status==='Зает'?'selected':''}>Зает</option>
                            </select>
                            <input type="text" value="${h.price}" onchange="updateHorse(${i}, 'price', this.value)">
                            <small>Здраве: ${h.health}</small>
                        </div>
                    `).join('')}
                `;
            } else {
                // КЛИЕНТСКИ ПАНЕЛ
                main.innerHTML = `
                    <h2>Свободни коне за езда</h2>
                    ${data.horses.map(h => `
                        <div class="card" style="border-left-color: ${h.status==='Свободен'?'var(--s)':'#ccc'}">
                            <b>${h.name}</b> - ${h.status}<br>
                            <b>Цена: ${h.price}</b>
                        </div>
                    `).join('')}
                `;
            }
        }

        // Функции за запис в Облака
        function saveStock() {
            const val = document.getElementById('hay-inp').value;
            db.ref('base_data/inventory/hay').set(parseInt(val));
        }

        function updateHorse(index, field, value) {
            db.ref('base_data/horses/' + index + '/' + field).set(value);
        }

        function toggleM() { document.getElementById('sb').classList.toggle('active'); }
    </script>
</body>
</html>
