<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFermata | Конна База Зорница</title>
    <style>
        :root { --p: #10214a; --s: #27ae60; --bg: #f4f7f6; --w: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }

        /* ВХОДНА СТРАНИЦА */
        #login-screen { position: fixed; inset: 0; background: var(--p); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; color: #333; }
        .login-card img { width: 80px; margin-bottom: 15px; border-radius: 50%; border: 2px solid var(--p); }
        .login-btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-admin { background: var(--p); color: white; }
        .btn-client { background: var(--s); color: white; }

        /* HEADER & LAYOUT */
        .header { background: var(--p); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; height: 70px; position: sticky; top: 0; z-index: 1000; }
        .header img { width: 40px; height: 40px; border-radius: 50%; background: white; }
        
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--p); transition: 0.3s; z-index: 2000; padding-top: 20px; }
        .sidebar.active { left: 0; }
        .nav-link { width: 100%; background: none; border: none; color: #adb5bd; padding: 15px 25px; text-align: left; font-size: 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-link.active { color: white; background: rgba(39, 174, 96, 0.2); border-left: 5px solid var(--s); }

        /* CONTENT */
        .main { padding: 20px; height: calc(100vh - 70px); overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 5px solid var(--s); }
        .admin-only { border-left-color: #d32f2f; }
        
        h2 { margin-bottom: 15px; color: var(--p); font-size: 1.3rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat { background: #eee; padding: 10px; border-radius: 8px; text-align: center; }
        .stat b { display: block; font-size: 1.2rem; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="login-screen">
        <div class="login-card">
            <img src="logo.png" alt="Logo">
            <h3>Добре дошли в SmartFermata</h3>
            <p style="margin-bottom: 20px; font-size: 0.9rem;">Изберете режим на достъп:</p>
            <button class="login-btn btn-admin" onclick="login('admin')">ВХОД АДМИНИСТРАТОР</button>
            <button class="login-btn btn-client" onclick="login('client')">ВХОД КЛИЕНТ</button>
        </div>
    </div>

    <header class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="logo.png" alt="Logo">
            <b id="user-title">SmartFermata</b>
        </div>
        <button onclick="toggleM()" style="background:none; border:none; color:white; font-size:30px;">☰</button>
    </header>

    <div class="overlay" id="ov" onclick="toggleM()"></div>

    <aside class="sidebar" id="sb">
        <div style="text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.1);">
            <img src="logo.png" style="width:70px; border-radius:50%; background:white; border:2px solid var(--s);">
            <h4 id="menu-name" style="color:white; margin-top:10px;">Панел</h4>
        </div>
        <nav id="nav-container">
            </nav>
        <button onclick="location.reload()" style="width:100%; color:#ff4444; padding:20px; background:none; border:none; text-align:left;">✕ Изход</button>
    </aside>

    <main class="main" id="content-container">
        </main>

    <script>
        const data = {
            admin: [
                { id: 'a_dash', n: '📊 Табло Управление', c: `<h2>Общ преглед на базата</h2><div class="grid"><div class="stat"><b>12</b>Коне</div><div class="stat"><b>4</b>Работника</div><div class="stat"><b>480€</b>Приход днес</div><div class="stat"><b>100%</b>Фураж</div></div>` },
                { id: 'a_horses', n: '🐎 Регистър & Хранене', c: `<h2>Списък Коне</h2><div class="card"><b>Грохот (Жребец)</b><br>Хранене: 07:00 / 13:00 / 19:00<br>Дажба: Сено 5кг, Овес 2кг</div><div class="card"><b>Звезда (Кобила)</b><br>Специален режим: Добавки за стави</div>` },
                { id: 'a_vet', n: '🩺 Ветеринар & Здраве', c: `<h2>Медицински картони</h2><div class="card admin-only"><b>Ваксинация:</b> Предстои за 5 коня на 20.04<br><b>Ветеринар:</b> Д-р Иванов (0888 123 456)</div>` },
                { id: 'a_staff', n: '👥 Работници & Смени', c: `<h2>Персонал</h2><div class="card"><b>Иван (Главен Гледач)</b><br>Смяна: 06:00 - 18:00<br>Задачи: Почистване на боксове</div>` }
            ],
            client: [
                { id: 'c_dash', n: '🏠 Начало', c: `<h2>Добре дошли в Зорница!</h2><div class="card">Насладете се на професионално обучение и разходки сред природата.</div>` },
                { id: 'c_prices', n: '💰 Цени & Услуги', c: `<h2>Услуги</h2><div class="card"><b>Индивидуално обучение</b><br>Цена: 40 лв. / 45 мин.</div><div class="card"><b>Разходка в гората</b><br>Цена: 50 лв. / 60 мин.</div>` },
                { id: 'c_status', n: '🐎 Свободни Коне', c: `<h2>Коне за езда днес</h2><div class="card" style="border-left-color:var(--s)"><b>Звезда</b> - Свободна (Подходяща за начинаещи)</div><div class="card" style="border-left-color:var(--s)"><b>Вихър</b> - Свободен (За напреднали)</div>` }
            ]
        };

        function login(role) {
            document.getElementById('login-screen').style.display = 'none';
            const nav = document.getElementById('nav-container');
            const content = document.getElementById('content-container');
            const items = data[role];

            document.getElementById('user-title').innerText = role === 'admin' ? 'Админ Панел' : 'Клиентски Панел';
            document.getElementById('menu-name').innerText = role === 'admin' ? 'Цветелина (Админ)' : 'Гост';

            nav.innerHTML = '';
            content.innerHTML = '';

            items.forEach((item, index) => {
                nav.innerHTML += `<button class="nav-link ${index===0?'active':''}" onclick="show('${item.id}', this)">${item.n}</button>`;
                content.innerHTML += `<div id="${item.id}" class="page ${index===0?'active':''}">${item.c}</div>`;
            });
        }

        function toggleM() {
            document.getElementById('sb').classList.toggle('active');
            document.getElementById('ov').classList.toggle('active');
        }

        function show(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
            if(window.innerWidth < 769) toggleM();
        }

        // ЗАЩИТА
        document.onkeydown = (e) => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
        setInterval(() => { (function(){return false}['constructor']('debugger')['call']()); }, 50);
    </script>
</body>
</html>
