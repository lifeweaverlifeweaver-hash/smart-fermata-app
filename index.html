<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFermata Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #10214a; --secondary: #27ae60; --accent: #3498db; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow-x: hidden; }
        
        /* Sidebar Menu */
        .sidebar { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: var(--primary); transition: 0.3s; z-index: 1000; padding-top: 60px; color: white; }
        .sidebar.active { left: 0; }
        .nav-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item i { margin-right: 15px; width: 20px; }

        .top-bar { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 900; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .menu-btn { font-size: 24px; cursor: pointer; margin-right: 20px; }
        
        .card { background: white; margin: 15px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; color: white; }
        
        #login-screen { position: fixed; inset: 0; background: var(--primary); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .btn-main { width: 80%; padding: 20px; margin: 10px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .save-btn { background: var(--secondary); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 32px; margin-bottom: 30px;">SmartFermata</h1>
        <button class="btn-main" style="background: white; color: var(--primary);" onclick="init('admin')">АДМИНИСТРАТОР</button>
        <button class="btn-main" style="background: var(--secondary); color: white;" onclick="init('client')">КЛИЕНТИ</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="nav-item" onclick="showSection('horses')"><i class="fas fa-horse"></i> Регистър Коне</div>
        <div class="nav-item" onclick="showSection('stock')"><i class="fas fa-boxes"></i> Склад (Бали)</div>
        <div class="nav-item" onclick="showSection('health')"><i class="fas fa-stethoscope"></i> Здраве и Ветеринар</div>
        <div class="nav-item" onclick="showSection('staff')"><i class="fas fa-users"></i> Персонал</div>
        <div class="nav-item" onclick="location.reload()" style="margin-top: 50px; color: #ff7675;"><i class="fas fa-sign-out-alt"></i> Изход</div>
    </div>

    <div class="top-bar">
        <i class="fas fa-bars menu-btn" onclick="toggleMenu()"></i>
        <span id="page-title">SmartFermata</span>
    </div>

    <div id="main-content"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAfkaWtQyWDHLOIXCG4CrpAOX3Nt9pmcpE",
            authDomain: "smartfermata.firebaseapp.com",
            databaseURL: "https://smartfermata-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "smartfermata",
            storageBucket: "smartfermata.firebasestorage.app",
            messagingSenderId: "638532750076",
            appId: "1:638532750076:web:715d1de54b1046ed9d1234"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentRole = '';
        let appData = null;

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        function init(role) {
            currentRole = role;
            document.getElementById('login-screen').style.display = 'none';
            db.ref('smart_fermata').on('value', (snap) => {
                appData = snap.val();
                showSection(role === 'admin' ? 'horses' : 'clientView');
            });
        }

        function showSection(section) {
            const container = document.getElementById('main-content');
            const title = document.getElementById('page-title');
            container.innerHTML = '';
            toggleMenu(); // Затваря менюто при избор

            if (section === 'horses') {
                title.innerText = "Коне и Цени";
                appData.horses.forEach((h, i) => {
                    container.innerHTML += `
                        <div class="card">
                            <h3>🐎 ${h.name}</h3>
                            <label>Статус:</label>
                            <select onchange="update('horses/${i}/status', this.value)">
                                <option ${h.status==='Свободен'?'selected':''}>Свободен</option>
                                <option ${h.status==='Зает'?'selected':''}>Зает</option>
                            </select>
                            <label>Цена за час:</label>
                            <input type="text" value="${h.price}" onchange="update('horses/${i}/price', this.value)">
                        </div>`;
                });
            } else if (section === 'stock') {
                title.innerText = "Управление на Склада";
                container.innerHTML = `
                    <div class="card">
                        <h3>📦 Налично сено (бали)</h3>
                        <input type="number" id="hay" value="${appData.stock.hay}">
                        <button class="save-btn" onclick="update('stock/hay', document.getElementById('hay').value)">Обнови Склада</button>
                    </div>`;
            } else if (section === 'health') {
                title.innerText = "Здраве и Хранене";
                appData.horses.forEach((h, i) => {
                    container.innerHTML += `
                        <div class="card">
                            <h3>🩺 ${h.name}</h3>
                            <label>Здравен статус:</label>
                            <input type="text" value="${h.health || 'Здрав'}" onchange="update('horses/${i}/health', this.value)">
                            <label>График на хранене:</label>
                            <input type="text" value="${h.food || '07:00 / 19:00'}" onchange="update('horses/${i}/food', this.value)">
                        </div>`;
                });
            } else if (section === 'clientView') {
                title.innerText = "Свободни коне";
                appData.horses.forEach(h => {
                    container.innerHTML += `
                        <div class="card">
                            <h2>${h.name}</h2>
                            <p>Статус: <b style="color:${h.status==='Свободен'?'green':'red'}">${h.status}</b></p>
                            <p>Цена: ${h.price}</p>
                            <button class="save-btn" style="background:var(--accent)">Резервирай</button>
                        </div>`;
                });
            }
        }

        function update(path, val) { db.ref('smart_fermata/' + path).set(val); }
    </script>
</body>
</html>
