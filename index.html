<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horsenook Enterprise | Final Master</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #3d2b1f; --s: #8c7356; --bg: #f9f6f2; --accent: #d4a373; --white: #ffffff; --red: #e74c3c; --green: #27ae60; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--p); transition: 0.3s; z-index: 1000; padding-top: 50px; }
        .sidebar.active { left: 0; }
        .nav-item { padding: 18px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; color: white; }
        .nav-item i { margin-right: 15px; width: 20px; color: var(--accent); }
        
        .top-bar { background: var(--p); color: var(--white); padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 900; }
        .card { background: var(--white); margin: 12px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 6px solid var(--s); }
        
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-main { background: var(--p); color: var(--white); border: none; padding: 16px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }

        /* Корекция на платежните бутони */
        .pay-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .pay-btn { padding: 15px; border: 2px solid #eee; border-radius: 10px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; color: #555; }
        .pay-btn i { font-size: 18px; margin-bottom: 5px; display: block; }
        .pay-btn.active { border-color: var(--s); background: #fdfaf5; color: var(--p); }

        #login-screen { position: fixed; inset: 0; background: var(--p); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--white); text-align: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="https://lifeweaverlifeweaver-hash.github.io/smart-fermata-app/logo.png" style="width:100px; border-radius:50%; background:white; padding:5px; margin-bottom:20px;">
        <h2>HORSENOOK ENTERPRISE</h2>
        <button class="btn-main" style="background:white; color:var(--p); width:85%; margin-bottom:15px;" onclick="startApp('admin')">МЕНИДЖЪР ПАНЕЛ</button>
        <button class="btn-main" style="background:var(--accent); width:85%;" onclick="startApp('client')">КЛИЕНТСКИ ПОРТАЛ</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div id="adm-menu" style="display:none;">
            <div class="nav-item" onclick="showPage('dash')"><i class="fas fa-chart-line"></i> Отчети</div>
            <div class="nav-item" onclick="showPage('hr')"><i class="fas fa-user-clock"></i> Персонал</div>
            <div class="nav-item" onclick="showPage('stock')"><i class="fas fa-warehouse"></i> Склад</div>
            <div class="nav-item" onclick="showPage('finance')"><i class="fas fa-file-invoice-dollar"></i> Счетоводство</div>
        </div>
        <div id="cli-menu" style="display:none;">
            <div class="nav-item" onclick="showPage('booking')"><i class="fas fa-calendar-alt"></i> Нова Резервация</div>
        </div>
        <div class="nav-item" onclick="location.reload()" style="color:var(--red); margin-top:20px;"><i class="fas fa-power-off"></i> Изход</div>
    </div>

    <div class="top-bar">
        <i class="fas fa-bars" style="font-size:24px; margin-right:15px; cursor:pointer;" onclick="document.getElementById('sidebar').classList.toggle('active')"></i>
        <b id="h-title">Horsenook</b>
    </div>

    <div id="content"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBrZworxGoCtk4ul0jBGcjsCDlDh7T-xQU",
            authDomain: "smartfermata.firebaseapp.com",
            databaseURL: "https://smartfermata-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "smartfermata"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let appRole = ''; let appData = null; let selectedPay = 'Карта';

        function startApp(role) {
            appRole = role;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById(role === 'admin' ? 'adm-menu' : 'cli-menu').style.display = 'block';
            db.ref('horsenook_v10').on('value', (s) => {
                appData = s.val();
                if(!appData) db.ref('horsenook_v10').set({ income: 610, horses: [{name:"Сириус", price:60}, {name:"Бела", price:60}] });
                else showPage(role === 'admin' ? 'dash' : 'booking');
            });
        }

        function showPage(p) {
            const v = document.getElementById('content');
            document.getElementById('sidebar').classList.remove('active');
            v.innerHTML = '';

            if(p === 'dash') {
                document.getElementById('h-title').innerText = "Дневен Отчет";
                v.innerHTML = `<div class="card" style="background:var(--p); color:white; text-align:center;"><h2>${appData.income} лв.</h2><p>Общ Оборот</p></div>`;
            } else if (p === 'booking') {
                document.getElementById('h-title').innerText = "Нова Резервация";
                appData.horses.forEach((h, i) => {
                    v.innerHTML += `
                    <div class="card">
                        <h3>🐎 ${h.name} - ${h.price} лв.</h3>
                        <input id="n-${i}" placeholder="Трите Ви имена"><input id="t-${i}" type="tel" placeholder="Телефон">
                        <div class="pay-grid">
                            <div class="pay-btn active" onclick="setPay(this, 'Карта')"><i class="fab fa-stripe" style="color:#635bff"></i>Карта</div>
                            <div class="pay-btn" onclick="setPay(this, 'PayPal')"><i class="fab fa-paypal" style="color:#003087"></i>PayPal</div>
                            <div class="pay-btn" onclick="setPay(this, 'ViberPay')"><i class="fab fa-viber" style="color:#7360f2"></i>ViberPay</div>
                            <div class="pay-btn" onclick="setPay(this, 'EasyPay')"><i class="fas fa-money-bill-wave"></i>EasyPay</div>
                        </div>
                        <button class="btn-main" onclick="book(${i}, ${h.price})">ПЛАТИ И ЗАПАЗИ</button>
                    </div>`;
                });
            } else if (p === 'finance') {
                document.getElementById('h-title').innerText = "Счетоводство";
                v.innerHTML = `<div class="card"><h3>📊 ContoWeave Анализ</h3><p>Текущ приход за деня: ${appData.income} лв.</p><button class="btn-main" onclick="alert('Z-отчет изпратен!')">ГЕНЕРИРАЙ ОТЧЕТ</button></div>`;
            }
        }

        function setPay(el, m) { document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); selectedPay = m; }
        function book(idx, price) {
            db.ref('horsenook_v10/income').set(appData.income + price);
            alert('Успешна резервация!');
        }
    </script>
</body>
</html>
