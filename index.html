<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFermata Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #10214a; --s: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        
        /* Меню */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--p); transition: 0.3s; z-index: 1000; padding-top: 60px; box-shadow: 4px 0 15px rgba(0,0,0,0.3); }
        .sidebar.active { left: 0; }
        .nav-item { padding: 20px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; color: white; font-size: 16px; }
        .nav-item i { margin-right: 15px; width: 20px; color: #3498db; }
        .nav-item:active { background: rgba(255,255,255,0.1); }

        .top-bar { background: var(--p); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 900; height: 30px; }
        .menu-btn { font-size: 24px; cursor: pointer; margin-right: 15px; }
        
        /* Карти */
        .card { background: white; margin: 12px; padding: 18px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--s); }
        .admin-card { border-left-color: var(--p); }
        
        #login-screen { position: fixed; inset: 0; background: var(--p); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-main { width: 85%; padding: 20px; margin: 10px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; background: #fff; }
        label { font-size: 11px; color: #777; font-weight: bold; text-transform: uppercase; margin-top: 10px; display: block; }
        .save-btn { background: var(--p); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

        <div id="login-screen">
        <img src="https://lifeweaverlifeweaver-hash.github.io/smart-fermata-app/logo.png" 
             alt="Logo" 
             style="width: 120px; height: 120px; border-radius: 50%; background: white; padding: 5px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        
        <h1 style="color:white; margin-bottom:40px; font-family: 'Segoe UI', sans-serif;">SmartFermata</h1>
        
        <button class="btn-main" style="background:white; color:var(--p);" onclick="entry('admin')">СОБСТВЕНИК</button>
        <button class="btn-main" style="background:var(--s); color:white;" onclick="entry('client')">КЛИЕНТИ</button>
    </div>


    <div class="sidebar" id="menu">
        <div id="m-admin">
            <div class="nav-item" onclick="view('h')"><i class="fas fa-horse"></i> Регистър Коне</div>
            <div class="nav-item" onclick="view('s')"><i class="fas fa-boxes"></i> Склад (Бали)</div>
            <div class="nav-item" onclick="view('v')"><i class="fas fa-medkit"></i> Здраве / Ветеринар</div>
        </div>
        <div id="m-client" style="display:none">
            <div class="nav-item" onclick="view('c')"><i class="fas fa-search"></i> Свободни за езда</div>
        </div>
        <div class="nav-item" onclick="location.reload()" style="color:#ff7675; margin-top:30px;"><i class="fas fa-power-off"></i> Изход</div>
    </div>

    <div class="top-bar">
        <i class="fas fa-bars menu-btn" onclick="document.getElementById('menu').classList.toggle('active')"></i>
        <b id="title">SmartFermata</b>
    </div>

    <div id="main"></div>

    <script>
        const cfg = {
            apiKey: "AIzaSyAfkaWtQyWDHLOIXCG4CrpAOX3Nt9pmcpE",
            authDomain: "smartfermata.firebaseapp.com",
            databaseURL: "https://smartfermata-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "smartfermata"
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        let role = '';
        let store = null;

        function entry(r) {
            role = r;
            document.getElementById('login-screen').style.display = 'none';
            if(r === 'client') {
                document.getElementById('m-admin').style.display = 'none';
                document.getElementById('m-client').style.display = 'block';
            }
            // Слушател в реално време
            db.ref('smart_fermata').on('value', (s) => {
                store = s.val();
                if(!store) { setup(); } else { view(role === 'admin' ? 'h' : 'c'); }
            });
        }

        function view(page) {
            const main = document.getElementById('main');
            const head = document.getElementById('title');
            main.innerHTML = '';
            document.getElementById('menu').classList.remove('active');

            if(page === 'h') {
                head.innerText = "Коне и Цени";
                store.horses.forEach((h, i) => {
                    main.innerHTML += `<div class="card admin-card">
                        <label>Име</label><input type="text" value="${h.name}" onchange="upd('horses/${i}/name',this.value)">
                        <label>Статус</label><select onchange="upd('horses/${i}/status',this.value)">
                            <option ${h.status==='Свободен'?'selected':''}>Свободен</option>
                            <option ${h.status==='Зает'?'selected':''}>Зает</option>
                        </select>
                        <label>Цена</label><input type="text" value="${h.price}" onchange="upd('horses/${i}/price',this.value)">
                    </div>`;
                });
            } else if(page === 's') {
                head.innerText = "Склад";
                main.innerHTML = `<div class="card admin-card">
                    <h3>📦 Налично сено</h3>
                    <input type="number" id="hay" value="${store.stock.hay}">
                    <button class="save-btn" onclick="upd('stock/hay', document.getElementById('hay').value)">Обнови</button>
                </div>`;
            } else if(page === 'v') {
                head.innerText = "Здраве и Хранене";
                store.horses.forEach((h, i) => {
                    main.innerHTML += `<div class="card" style="border-left-color:#e74c3c">
                        <b>🐎 ${h.name}</b>
                        <label>Здраве</label><input type="text" value="${h.health}" onchange="upd('horses/${i}/health',this.value)">
                        <label>Храна/Час</label><input type="text" value="${h.food}" onchange="upd('horses/${i}/food',this.value)">
                    </div>`;
                });
            } else if(page === 'c') {
                head.innerText = "Свободни за езда";
                store.horses.forEach(h => {
                    main.innerHTML += `<div class="card">
                        <h3>${h.name}</h3>
                        <p>Статус: <b style="color:${h.status==='Свободен'?'#27ae60':'#e74c3c'}">${h.status}</b></p>
                        <p>Цена: <b>${h.price}</b></p>
                        ${h.status==='Свободен'?'<button class="save-btn" style="background:#27ae60">Резервирай</button>':''}
                    </div>`;
                });
            }
        }

        function upd(p, v) { db.ref('smart_fermata/'+p).set(v); }

        function setup() {
            const data = {
                horses: [
                    {name:"Грохот", status:"Свободен", price:"40 лв", health:"Здрав", food:"07:00 / 19:00"},
                    {name:"Звезда", status:"Свободен", price:"50 лв", health:"Здрав", food:"08:00 / 20:00"}
                ],
                stock: { hay: 50 }
            };
            db.ref('smart_fermata').set(data);
        }
    </script>
</body>
</html>
