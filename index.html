<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFermata App</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --p: #10214a; --s: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: var(--p); color: white; padding: 20px; text-align: center; font-size: 22px; font-weight: bold; }
        .card { background: white; margin: 15px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 6px solid var(--s); }
        .btn { width: 85%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #login-screen { position: fixed; inset: 0; background: var(--p); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
        label { font-size: 12px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="logo.png" style="width:100px; margin-bottom:20px; border-radius:50%;">
        <h2 style="margin-bottom:20px;">SmartFermata</h2>
        <button class="btn" style="background: white; color: var(--p);" onclick="start('admin')">ВХОД СОБСТВЕНИК</button>
        <button class="btn" style="background: var(--s); color: white;" onclick="start('client')">ВХОД КЛИЕНТИ</button>
    </div>

    <div class="header">SmartFermata</div>
    <div id="content"></div>

    <script>
        // ТВОЯТА ПЕРСОНАЛИЗИРАНА КОНФИГУРАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyAfkaWtQyWDHLOIXCG4CrpAOX3Nt9pmcpE",
            authDomain: "smartfermata.firebaseapp.com",
            // Ето ТУК беше разковничето - добавих точния адрес за Европа:
            databaseURL: "https://smartfermata-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "smartfermata",
            storageBucket: "smartfermata.firebasestorage.app",
            messagingSenderId: "638532750076",
            appId: "1:638532750076:web:715d1de54b1046ed9d1234"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function start(role) {
            document.getElementById('login-screen').style.display = 'none';
            
            // Свързване и автоматично запълване, ако е празно
            db.ref('smart_fermata').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    const initial = {
                        horses: [
                            {name: "Грохот", status: "Свободен", price: "40 лв", health: "Здрав", food: "07:00 / 19:00"},
                            {name: "Звезда", status: "Свободен", price: "50 лв", health: "Здрав", food: "08:00 / 20:00"}
                        ],
                        stock: { hay: 50, oats: 100 },
                        staff: [{name: "Иван", shift: "Дневна"}]
                    };
                    db.ref('smart_fermata').set(initial);
                } else {
                    renderUI(role, data);
                }
            });
        }

        function renderUI(role, data) {
            const container = document.getElementById('content');
            container.innerHTML = '';

            if(role === 'admin') {
                container.innerHTML = `<h3 style="margin-left:20px;">Админ Панел (Цветелина)</h3>`;
                
                // Секция Склад
                container.innerHTML += `
                    <div class="card" style="border-left-color: var(--p)">
                        <b>📦 Склад: Сено</b>
                        <input type="number" id="hay-val" value="${data.stock.hay}">
                        <button onclick="updateDb('stock/hay', document.getElementById('hay-val').value)" style="background:var(--p); color:white; border:none; padding:10px; border-radius:5px; width:100%;">Обнови Склад</button>
                    </div>`;

                // Секция Коне
                data.horses.forEach((h, i) => {
                    container.innerHTML += `
                        <div class="card" style="border-left-color: var(--p)">
                            <b>🐎 ${h.name}</b><br>
                            <label>Статус:</label>
                            <select onchange="updateDb('horses/${i}/status', this.value)">
                                <option ${h.status==='Свободен'?'selected':''}>Свободен</option>
                                <option ${h.status==='Зает'?'selected':''}>Зает</option>
                            </select>
                            <label>Цена:</label>
                            <input type="text" value="${h.price}" onchange="updateDb('horses/${i}/price', this.value)">
                            <label>Здраве:</label>
                            <input type="text" value="${h.health}" onchange="updateDb('horses/${i}/health', this.value)">
                        </div>`;
                });
            } else {
                container.innerHTML = `<h3 style="margin-left:20px;">Налични коне за езда</h3>`;
                data.horses.forEach(h => {
                    container.innerHTML += `
                        <div class="card">
                            <b style="font-size:18px;">${h.name}</b> - <span style="color:${h.status==='Свободен'?'green':'red'}">${h.status}</span><br>
                            <p>Цена: <b>${h.price}</b></p>
                            <button class="btn" style="background:#0070ba; color:white; width:100%; padding:10px;" onclick="alert('Плащане...')">Резервирай и Плати</button>
                        </div>`;
                });
            }
        }

        function updateDb(path, value) {
            db.ref('smart_fermata/' + path).set(value);
        }
    </script>
</body>
</html>
